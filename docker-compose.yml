version: '3.8'

services:
  web:
    image: fastapi-web:latest
    build: ./python
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - backend
      - frontend
    ports:
      - 80:8000
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  frontend:
    image: react-frontend:latest
    build: ./node
    command: npm run dev
    networks:
      - frontend
    ports:
      - 5173:5173
    deploy:
      replicas: 1

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - backend
    volumes:
      - postgres:/var/lib/postgresql/data
    deploy:
      placement:
        constraints: [node.role == manager]

networks:
  backend:
    driver: overlay
  frontend:
    driver: overlay

volumes:
  postgres:
    driver: local
